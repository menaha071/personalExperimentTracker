<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <style>
        body { font-family: Arial; background: #f5f7fa; }
        .container { padding: 20px; }
        .card {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 6px;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
        }
        a { text-decoration: none; color: blue; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Dashboard</h1>

        <div class="card">
            <h3>Total Experiments: 5</h3>
            <p>Active streak: 3 days</p>
        </div>

        <div class="card">
            <h3>Recent Activity</h3>
            <p>Logged "Workout" today</p>
        </div>

        <a href="/experiment">View Experiments</a><br>
        <a href="/analytics">View Analytics</a>
    </div>
</body>
</html>
