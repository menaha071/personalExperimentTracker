<!DOCTYPE html>
<html>
<head>
    <title>Experiments</title>
    <style>
        body { font-family: Arial; background: #f5f7fa; }
        .container { padding: 20px; }
        .card {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 6px;
        }
        button {
            padding: 8px 12px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Experiments</h1>

        <div class="card">
            <h3>Workout</h3>
            <p>Track daily exercise</p>
            <button>Add Log</button>
        </div>

        <div class="card">
            <h3>Reading</h3>
            <p>Read 20 pages daily</p>
            <button>Add Log</button>
        </div>

        <button>Create New Experiment</button>
    </div>
</body>
</html>
